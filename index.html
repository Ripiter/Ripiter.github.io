<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Week Events → Base64 JSON / ASCII</title>
  <style>
    :root{
      --bg:#0f1115; --panel:#151924; --panel2:#10131b; --text:#e7eaf0; --muted:#aab2c3;
      --accent:#5aa7ff; --danger:#ff6b6b; --border:#242a3a;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg); color:var(--text);
      padding:18px;
    }
    h1{ font-size:18px; margin:0 0 12px; font-weight:700; }
    h2{ font-size:14px; margin:0 0 10px; font-weight:700; color:var(--text); }
    .grid{
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:14px;
      align-items:start;
    }
    @media (max-width: 1000px){
      .grid{ grid-template-columns: 1fr; }
    }
    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
    }
    .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .row > *{ flex: 0 0 auto; }
    label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
    input, textarea, select, button{
      font:inherit;
    }
    input, textarea, select{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 10px;
      outline:none;
    }
    input:focus, textarea:focus, select:focus{
      border-color: rgba(90,167,255,.65);
      box-shadow: 0 0 0 3px rgba(90,167,255,.18);
    }
    textarea{ width:100%; min-height:120px; resize:vertical; line-height:1.35; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    button{
      background:transparent;
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
    }
    button.primary{
      background: rgba(90,167,255,.15);
      border-color: rgba(90,167,255,.5);
    }
    button.danger{
      background: rgba(255,107,107,.12);
      border-color: rgba(255,107,107,.5);
      color: #ffd6d6;
    }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .muted{ color:var(--muted); font-size:12px; }
    .weekDays{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap:8px;
      margin-top:10px;
    }
    .dayBtn{
      text-align:center;
      padding:10px 6px;
      border-radius:10px;
      background:var(--panel2);
      border:1px solid var(--border);
      cursor:pointer;
      user-select:none;
    }
    .dayBtn strong{ display:block; font-size:12px; }
    .dayBtn span{ display:block; font-size:11px; color:var(--muted); margin-top:4px; }
    .dayBtn.active{
      border-color: rgba(90,167,255,.65);
      box-shadow: 0 0 0 3px rgba(90,167,255,.18);
    }
    .eventsList{
      margin-top:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .eventItem{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background: rgba(0,0,0,.12);
    }
    .eventTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .eventTitle{
      font-weight:700;
      font-size:13px;
      margin:0;
    }
    .eventMeta{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
      line-height:1.35;
      white-space:pre-wrap;
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border:1px solid var(--border);
      border-radius:999px;
      font-size:11px;
      color:var(--muted);
      margin-right:6px;
    }
    .splitBox{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .warn{ color: #ffd38c; }
    .ok{ color: #b9ffca; }
    .footerNote{ margin-top:8px; }
  </style>
</head>
<body>
  <h1>Week Events → Base64 JSON / ASCII</h1>

  <div class="grid">
    <!-- LEFT: input -->
    <div class="card">
      <h2>Week + event input</h2>

      <div class="row" style="gap:12px;">
        <div style="flex:1; min-width:190px;">
          <label for="weekPicker">ISO week</label>
          <input id="weekPicker" type="week" />
          <div class="muted footerNote" id="weekRangeText"></div>
        </div>
        <div style="flex:1; min-width:190px;">
          <label for="selectedDate">Date (auto set by day buttons)</label>
          <input id="selectedDate" type="date" />
        </div>
      </div>

      <div class="weekDays" id="weekDays"></div>

      <hr style="border:none;border-top:1px solid var(--border); margin:14px 0;">

      <div class="row" style="gap:12px;">
        <div style="flex:1; min-width:160px;">
          <label for="startTime">Start time</label>
          <!-- user can type any HH:MM; browser still helps -->
          <input id="startTime" type="time" />
          <div class="muted">You can type any time; no enforced granularity.</div>
        </div>
        <div style="flex:1; min-width:160px;">
          <label for="endDate">End date (optional)</label>
          <input id="endDate" type="date" />
        </div>
        <div style="flex:1; min-width:160px;">
          <label for="endTime">End time (optional)</label>
          <input id="endTime" type="time" />
        </div>
      </div>

      <div class="row" style="margin-top:10px; gap:12px;">
        <div style="flex:1; min-width:200px;">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="e.g. Trening" style="width:100%;" />
        </div>
        <div style="flex:1; min-width:200px;">
          <label for="desc">Description</label>
          <input id="desc" type="text" placeholder="optional details" style="width:100%;" />
        </div>
      </div>

      <div class="row" style="margin-top:12px; justify-content:space-between;">
        <button class="primary" id="addBtn">Add event</button>
        <button class="danger" id="clearBtn">Clear all events</button>
      </div>

      <div class="eventsList" id="eventsList"></div>
    </div>

    <!-- RIGHT: outputs -->
    <div class="card">
      <h2>Outputs</h2>

      <div class="row" style="gap:10px; margin-bottom:10px;">
        <button class="primary" id="genBase64Btn">Generate Base64 JSON</button>
        <button class="primary" id="genAsciiBtn">Generate ASCII week table</button>
      </div>

      <div style="margin-top:10px;">
        <div class="row" style="justify-content:space-between; align-items:flex-end;">
          <div>
            <div class="muted">Base64 JSON (UTF-8 safe)</div>
          </div>
          <div class="row" style="gap:8px;">
            <button id="copyBase64Btn">Copy</button>
          </div>
        </div>
        <textarea id="base64Out" placeholder="(click Generate Base64 JSON)"></textarea>
      </div>

      <div style="margin-top:14px;">
        <div class="row" style="justify-content:space-between; align-items:flex-end;">
          <div>
            <div class="muted">ASCII week table (wrapped in code fences for Discord)</div>
            <div class="muted" id="asciiLenInfo"></div>
          </div>
          <div class="row" style="gap:8px;">
            <button id="copyAsciiBtn">Copy</button>
            <button id="splitAsciiBtn">Split for Discord</button>
          </div>
        </div>
        <textarea id="asciiOut" placeholder="(click Generate ASCII week table)"></textarea>

        <div class="splitBox" id="splitBox" style="display:none;"></div>
      </div>

      <div class="muted footerNote">
        Export format (base64 decoded JSON): <span class="mono">{ version: 1, weekStart: "YYYY-MM-DD", events: [...] }</span>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---- helpers ----
  const pad2 = (n) => String(n).padStart(2, "0");
  const toISODate = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const parseISODate = (s) => {
    // s = YYYY-MM-DD
    if (!s) return null;
    const [y,m,d] = s.split("-").map(Number);
    if (!y || !m || !d) return null;
    const dt = new Date(y, m-1, d);
    // guard against invalid
    if (dt.getFullYear() !== y || dt.getMonth() !== (m-1) || dt.getDate() !== d) return null;
    return dt;
  };
  const fmtDDMM = (d) => `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}`;
  const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

  // ISO week helpers
  function getISOWeekStartFromWeekInput(weekValue) {
    // weekValue like "2026-W09"
    const m = /^(\d{4})-W(\d{2})$/.exec(weekValue);
    if (!m) return null;
    const year = Number(m[1]);
    const week = Number(m[2]);

    // ISO week 1 is the week with Jan 4th in it.
    const jan4 = new Date(year, 0, 4);
    const jan4Day = (jan4.getDay() + 6) % 7; // Monday=0..Sunday=6
    const mondayWeek1 = new Date(jan4);
    mondayWeek1.setDate(jan4.getDate() - jan4Day);

    const monday = new Date(mondayWeek1);
    monday.setDate(mondayWeek1.getDate() + (week - 1) * 7);
    return monday;
  }

  function getISOWeekInputValueFromDate(d) {
    // returns "YYYY-Www" for given date d
    const date = new Date(d);
    // Thursday in current week decides the year
    const day = (date.getDay() + 6) % 7; // Mon=0
    date.setDate(date.getDate() - day + 3); // Thursday
    const isoYear = date.getFullYear();

    // Week 1: week containing Jan 4
    const jan4 = new Date(isoYear, 0, 4);
    const jan4Day = (jan4.getDay() + 6) % 7;
    const mondayWeek1 = new Date(jan4);
    mondayWeek1.setDate(jan4.getDate() - jan4Day);

    const diffDays = Math.round((date - mondayWeek1) / 86400000);
    const week = 1 + Math.floor(diffDays / 7);
    return `${isoYear}-W${pad2(week)}`;
  }

  function isWithinWeek(date, weekStart) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const ws = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate());
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    return d >= ws && d <= we;
  }

  function safeB64EncodeUTF8(str) {
    // UTF-8 safe base64 (handles Polish chars etc.)
    const utf8 = new TextEncoder().encode(str);
    let binary = "";
    const chunk = 0x8000;
    for (let i = 0; i < utf8.length; i += chunk) {
      binary += String.fromCharCode(...utf8.subarray(i, i + chunk));
    }
    return btoa(binary);
  }

  function safeB64DecodeUTF8(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function compareEvents(a, b) {
    // sort by date then time
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    const ta = a.startTime || "";
    const tb = b.startTime || "";
    if (ta !== tb) return ta < tb ? -1 : 1;
    return (a.name || "").localeCompare(b.name || "");
  }

  // ---- state ----
  let events = []; // {id, date, startTime, endDate, endTime, name, desc}
  let activeDayIndex = 0; // 0..6

  // ---- elements ----
  const weekPicker = document.getElementById("weekPicker");
  const weekRangeText = document.getElementById("weekRangeText");
  const weekDaysEl = document.getElementById("weekDays");

  const selectedDate = document.getElementById("selectedDate");
  const startTime = document.getElementById("startTime");
  const endDate = document.getElementById("endDate");
  const endTime = document.getElementById("endTime");
  const nameEl = document.getElementById("name");
  const descEl = document.getElementById("desc");

  const addBtn = document.getElementById("addBtn");
  const clearBtn = document.getElementById("clearBtn");
  const eventsList = document.getElementById("eventsList");

  const genBase64Btn = document.getElementById("genBase64Btn");
  const genAsciiBtn = document.getElementById("genAsciiBtn");
  const base64Out = document.getElementById("base64Out");
  const asciiOut = document.getElementById("asciiOut");
  const asciiLenInfo = document.getElementById("asciiLenInfo");
  const splitAsciiBtn = document.getElementById("splitAsciiBtn");
  const splitBox = document.getElementById("splitBox");

  const copyBase64Btn = document.getElementById("copyBase64Btn");
  const copyAsciiBtn = document.getElementById("copyAsciiBtn");

  // ---- week rendering ----
  const dayNames = ["Pn", "Wt", "Śr", "Cz", "Pt", "So", "Nd"]; // Polish 2-letter
  function setWeek(weekValue) {
    const ws = getISOWeekStartFromWeekInput(weekValue);
    if (!ws) return;
    const we = new Date(ws); we.setDate(ws.getDate() + 6);

    weekRangeText.textContent = `${fmtDDMM(ws)} - ${fmtDDMM(we)} (${toISODate(ws)} … ${toISODate(we)})`;

    // build day buttons
    weekDaysEl.innerHTML = "";
    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i);
      const btn = document.createElement("div");
      btn.className = "dayBtn" + (i === activeDayIndex ? " active" : "");
      btn.innerHTML = `<strong>${dayNames[i]}</strong><span>${fmtDDMM(d)}</span>`;
      btn.addEventListener("click", () => {
        activeDayIndex = i;
        // set selectedDate
        selectedDate.value = toISODate(d);
        // refresh active style
        [...weekDaysEl.children].forEach((c, idx) => c.classList.toggle("active", idx === activeDayIndex));
      });
      weekDaysEl.appendChild(btn);
    }

    // constrain date inputs to this week by default (still editable if user wants, but the picker will clamp)
    selectedDate.min = toISODate(ws);
    selectedDate.max = toISODate(we);
    endDate.min = toISODate(ws);
    endDate.max = toISODate(we);

    // default selected date to active day
    const d0 = new Date(ws); d0.setDate(ws.getDate() + activeDayIndex);
    selectedDate.value = toISODate(d0);

    renderEventsList();
  }

  function getCurrentWeekStart() {
    const ws = getISOWeekStartFromWeekInput(weekPicker.value);
    return ws;
  }

  // ---- events UI ----
  function renderEventsList() {
    const ws = getCurrentWeekStart();
    const we = new Date(ws); we.setDate(ws.getDate() + 6);

    const inWeek = events
      .filter(ev => {
        const d = parseISODate(ev.date);
        return d && isWithinWeek(d, ws);
      })
      .slice()
      .sort(compareEvents);

    eventsList.innerHTML = "";
    if (inWeek.length === 0) {
      const p = document.createElement("div");
      p.className = "muted";
      p.textContent = "No events yet for this week.";
      eventsList.appendChild(p);
      return;
    }

    for (const ev of inWeek) {
      const item = document.createElement("div");
      item.className = "eventItem";

      const timeStr = (() => {
        const s = ev.startTime || "";
        const hasEnd = (ev.endDate && ev.endTime) || ev.endTime || ev.endDate;
        if (!hasEnd) return s ? s : "(no time)";
        const ed = ev.endDate || ev.date;
        const et = ev.endTime || "";
        const sameDay = ed === ev.date;
        if (sameDay) return `${s || "(no start)"}–${et || "(no end)"}`;
        return `${ev.date} ${s || ""} → ${ed} ${et || ""}`.trim();
      })();

      const metaLines = [];
      metaLines.push(`${timeStr} • ${ev.date}`);
      if (ev.desc) metaLines.push(ev.desc);

      item.innerHTML = `
        <div class="eventTop">
          <div>
            <div class="eventTitle">${escapeHTML(ev.name || "(no name)")}</div>
            <div class="eventMeta">${escapeHTML(metaLines.join("\n"))}</div>
          </div>
          <div class="row" style="gap:8px;">
            <button class="danger" data-del="${ev.id}">Delete</button>
          </div>
        </div>
      `;
      item.querySelector(`[data-del="${ev.id}"]`).addEventListener("click", () => {
        events = events.filter(x => x.id !== ev.id);
        renderEventsList();
        // outputs may be stale
      });
      eventsList.appendChild(item);
    }
  }

  function escapeHTML(s) {
    return String(s)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function addEvent() {
    const ws = getCurrentWeekStart();
    if (!ws) return;

    const dateStr = selectedDate.value;
    const d = parseISODate(dateStr);
    if (!d || !isWithinWeek(d, ws)) {
      alert("Selected date must be within the chosen week (Mon–Sun).");
      return;
    }

    const st = (startTime.value || "").trim();
    const nm = (nameEl.value || "").trim();
    const ds = (descEl.value || "").trim();

    if (!nm) { alert("Name is required."); return; }
    if (!st) { alert("Start time is required."); return; }

    // end fields optional; if endTime given without endDate, assume same day
    let ed = (endDate.value || "").trim();
    let et = (endTime.value || "").trim();
    if (!ed && et) ed = dateStr;

    // if endDate provided, validate within week
    if (ed) {
      const edd = parseISODate(ed);
      if (!edd || !isWithinWeek(edd, ws)) {
        alert("End date must be within the chosen week (Mon–Sun).");
        return;
      }
    }

    events.push({
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random(),
      date: dateStr,
      startTime: st,
      endDate: ed || "",
      endTime: et || "",
      name: nm,
      desc: ds
    });

    // clear inputs except date/week
    startTime.value = "";
    endDate.value = "";
    endTime.value = "";
    nameEl.value = "";
    descEl.value = "";

    renderEventsList();
  }

  // ---- outputs ----
  function buildExportObject() {
    const ws = getCurrentWeekStart();
    const weekStartISO = toISODate(ws);

    // export only events within this week
    const filtered = events
      .filter(ev => {
        const d = parseISODate(ev.date);
        return d && isWithinWeek(d, ws);
      })
      .slice()
      .sort(compareEvents);

    return {
      version: 1,
      weekStart: weekStartISO,
      events: filtered.map(ev => ({
        date: ev.date,
        startTime: ev.startTime,
        endDate: ev.endDate || "",
        endTime: ev.endTime || "",
        name: ev.name,
        description: ev.desc || ""
      }))
    };
  }

  function generateBase64() {
    const obj = buildExportObject();
    const json = JSON.stringify(obj);
    base64Out.value = safeB64EncodeUTF8(json);
  }

  function generateASCII() {
    const ws = getCurrentWeekStart();
    const we = new Date(ws); we.setDate(ws.getDate() + 6);

    const obj = buildExportObject();
    const byDay = Array.from({length:7}, () => []);
    for (const ev of obj.events) {
      const d = parseISODate(ev.date);
      const idx = (d.getDay() + 6) % 7; // Mon=0
      byDay[idx].push(ev);
    }
    for (let i=0;i<7;i++){
      byDay[i].sort((a,b) => (a.startTime||"").localeCompare(b.startTime||"") || (a.name||"").localeCompare(b.name||""));
    }

    // Each event uses 3 rows: time, name, blank.
    const maxEvents = Math.max(0, ...byDay.map(a => a.length));
    const rowBlocks = maxEvents * 3;
    const header = `${fmtDDMM(ws)} - ${fmtDDMM(we)}`;

    // column widths
    const colW = 11; // compact but readable
    const cellPad = (s) => {
      const t = (s ?? "").toString();
      // hard truncate to fit cell
      if (t.length > colW) return t.slice(0, colW);
      return t + " ".repeat(colW - t.length);
    };

    const line = (left, mid, right) => left + mid.join("") + right;

    const topRule = " " + "_".repeat((colW+3)*7 + 1); // rough top underline
    const colSep = "|";

    const dayHeader = [
      colSep,
      ...dayNames.map(n => " " + cellPad(center(n, colW)) + " " + colSep)
    ].join("");

    const sep = [
      colSep,
      ...Array.from({length:7}, () => "-" + "-".repeat(colW) + "-" + colSep)
    ].join("");

    const rows = [];
    for (let r = 0; r < rowBlocks; r++) {
      const eventIndex = Math.floor(r / 3);
      const subRow = r % 3; // 0=time,1=name,2=blank
      const cells = [];
      for (let d = 0; d < 7; d++) {
        const ev = byDay[d][eventIndex];
        let text = "";
        if (ev) {
          if (subRow === 0) {
            text = formatTimeRange(ev);
          } else if (subRow === 1) {
            text = ev.name || "";
          } else {
            text = ""; // spacer
          }
        }
        cells.push(" " + cellPad(text) + " " + colSep);
      }
      rows.push(colSep + cells.join(""));
    }

    // bottom border
    const bottom = [
      colSep,
      ...Array.from({length:7}, () => "_"+ "_".repeat(colW) + "_" + colSep)
    ].join("");

    const ascii =
`${header}
${topRule}
${dayHeader}
${sep}
${rows.join("\n")}
${bottom}`;

    // Wrap in Discord code fences to preserve monospace
    const wrapped = "```text\n" + ascii + "\n```";
    asciiOut.value = wrapped;

    updateAsciiLenInfo();
    splitBox.style.display = "none";
    splitBox.innerHTML = "";
  }

  function center(s, w){
    const t = String(s);
    if (t.length >= w) return t.slice(0, w);
    const left = Math.floor((w - t.length)/2);
    const right = w - t.length - left;
    return " ".repeat(left) + t + " ".repeat(right);
  }

  function formatTimeRange(ev){
    const st = (ev.startTime || "").trim();
    const hasAnyEnd = (ev.endDate && ev.endTime) || ev.endTime || ev.endDate;
    if (!hasAnyEnd) return st;
    const ed = (ev.endDate || ev.date || "").trim();
    const et = (ev.endTime || "").trim();
    // Keep compact for cell: prefer same-day format
    if (ed === ev.date) {
      if (st && et) return `${st}-${et}`;
      if (st && !et) return `${st}-?`;
      if (!st && et) return `?-` + et;
      return "";
    }
    // different-day: too long, compress
    // example: "24/02 21:00→25/02 01:00"
    const sd = parseISODate(ev.date);
    const edd = parseISODate(ed);
    const sds = sd ? fmtDDMM(sd) : ev.date;
    const eds = edd ? fmtDDMM(edd) : ed;
    const compact = `${sds}${st ? " "+st : ""}→${eds}${et ? " "+et : ""}`;
    return compact;
  }

  function updateAsciiLenInfo(){
    const len = asciiOut.value.length;
    const ok = len <= 2000;
    asciiLenInfo.innerHTML = `Length: <span class="${ok ? "ok":"warn"}">${len}</span> / 2000`;
  }

  function splitForDiscord(){
    const text = asciiOut.value || "";
    if (!text) return;

    // Prefer splitting into multiple fenced code blocks.
    // Remove outer fences if present, then chunk the inner text.
    let inner = text;
    const fenceStart = inner.startsWith("```");
    if (fenceStart) {
      // strip first line ```something and trailing ```
      const lines = inner.split("\n");
      // remove first line and last line if it's ```
      if (lines.length >= 2 && lines[0].startsWith("```")) lines.shift();
      if (lines.length >= 1 && lines[lines.length-1].trim() === "```") lines.pop();
      inner = lines.join("\n");
    }

    const chunkLimit = 1900; // keep slack for fences and accidental edits
    const chunks = [];
    let cur = "";
    for (const line of inner.split("\n")) {
      const add = (cur ? "\n" : "") + line;
      if ((cur.length + add.length) > chunkLimit) {
        if (cur) chunks.push(cur);
        // if a single line is huge, hard cut
        if (line.length > chunkLimit) {
          let start = 0;
          while (start < line.length) {
            chunks.push(line.slice(start, start + chunkLimit));
            start += chunkLimit;
          }
          cur = "";
        } else {
          cur = line;
        }
      } else {
        cur += add;
      }
    }
    if (cur) chunks.push(cur);

    splitBox.style.display = "block";
    splitBox.innerHTML = "";

    chunks.forEach((c, i) => {
      const wrap = "```text\n" + c + "\n```";
      const container = document.createElement("div");
      container.innerHTML = `
        <div class="muted">Message ${i+1} / ${chunks.length} (length ${wrap.length})</div>
        <textarea readonly>${wrap}</textarea>
        <div class="row" style="justify-content:flex-end; gap:8px;">
          <button data-copy-split="${i}">Copy message ${i+1}</button>
        </div>
      `;
      container.querySelector(`[data-copy-split="${i}"]`).addEventListener("click", async () => {
        await navigator.clipboard.writeText(wrap);
      });
      splitBox.appendChild(container);
    });
  }

  async function copyFrom(el){
    const val = el.value || "";
    if (!val) return;
    await navigator.clipboard.writeText(val);
  }

  // ---- wiring ----
  addBtn.addEventListener("click", addEvent);
  clearBtn.addEventListener("click", () => {
    if (!confirm("Clear all events for all weeks in memory?")) return;
    events = [];
    renderEventsList();
    base64Out.value = "";
    asciiOut.value = "";
    splitBox.style.display = "none";
    splitBox.innerHTML = "";
    asciiLenInfo.textContent = "";
  });

  genBase64Btn.addEventListener("click", generateBase64);
  genAsciiBtn.addEventListener("click", generateASCII);

  copyBase64Btn.addEventListener("click", () => copyFrom(base64Out));
  copyAsciiBtn.addEventListener("click", () => copyFrom(asciiOut));

  splitAsciiBtn.addEventListener("click", splitForDiscord);

  asciiOut.addEventListener("input", updateAsciiLenInfo);

  // Keep selectedDate clamped to week when user edits it
  selectedDate.addEventListener("change", () => {
    const ws = getCurrentWeekStart();
    if (!ws) return;
    const d = parseISODate(selectedDate.value);
    if (!d) return;
    if (!isWithinWeek(d, ws)) {
      // clamp to nearest boundary
      const we = new Date(ws); we.setDate(ws.getDate()+6);
      const clamped = d < ws ? ws : we;
      selectedDate.value = toISODate(clamped);
    }
    // update active day index highlight
    const d2 = parseISODate(selectedDate.value);
    const idx = (d2.getDay() + 6) % 7;
    activeDayIndex = clamp(idx, 0, 6);
    [...weekDaysEl.children].forEach((c, i) => c.classList.toggle("active", i === activeDayIndex));
  });

  endDate.addEventListener("change", () => {
    const ws = getCurrentWeekStart();
    if (!ws) return;
    const d = parseISODate(endDate.value);
    if (!d) return;
    if (!isWithinWeek(d, ws)) {
      const we = new Date(ws); we.setDate(ws.getDate()+6);
      const clamped = d < ws ? ws : we;
      endDate.value = toISODate(clamped);
    }
  });

  weekPicker.addEventListener("change", () => {
    // reset active day index to Monday for new week
    activeDayIndex = 0;
    setWeek(weekPicker.value);
    // clear outputs (they depend on week)
    base64Out.value = "";
    asciiOut.value = "";
    splitBox.style.display = "none";
    splitBox.innerHTML = "";
    asciiLenInfo.textContent = "";
  });

  // init with current date
  const today = new Date();
  weekPicker.value = getISOWeekInputValueFromDate(today);
  activeDayIndex = 0;
  setWeek(weekPicker.value);

})();
</script>
